<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이게 뭐약?</title>
  <link rel="stylesheet" href="style.css">

  
</head>

<body>
  <div class="container">
    <h1>이게 뭐약?</h1>

    <p>전문약사와 함께하는 맞춤영양제 추천 커뮤니티입니다.</p>

    <h2>인기 질문</h2>
    <ul id="questionList">
      <li>마그네슘은 자기 전에 먹어도 되나요?</li>
      <li>비타민D와 오메가3를 같이 먹어도 되나요?</li>
      <li>피로할 때 먹기 좋은 영양제는 무엇인가요?</li>
    </ul>

    <h2>약사 랭킹</h2>
    <ol>
      <li>김약사 - 답변 128개</li>
      <li>박약사 - 답변 97개</li>
      <li>이약사 - 답변 81개</li>
    </ol>

    <input id="questionInput" type="text" placeholder="궁금한 영양제 질문을 입력하세요">
    <button id="askButton">질문하기</button>
  </div>
  
<script src="script.js"></script>
</body>
</html>
